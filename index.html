<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTT Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
.container{background-color:rgb(83, 44, 21);
    height: 600px;
    max-width: 80%;
    text-align: center;
    font-family: 'Times New Roman', Times, serif;
    padding: 20px;
    margin-top: 150px;
}

body{background-color: rgb(227, 207, 197);}
    </style>
</head>
<body>
    
<div class="container">
  <p class="text-light"> LOGIN PAGE </p>
   <form onsubmit="authenticate()">

        <label class="text-light">Username: </label>
        <input type="text" id="user" placeholder="Enter Username" required>
        <br><br>
        <label class="text-light">Password: </label>
        <input type="text" id="pass" placeholder="Enter the Password" required>
<br><br><br><br>
        <input type="submit" value="Login" class="loginbtn">
        <input type="reset" value="cancel" class="cancelbtn">
      </form>


</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
